
services:
  catalog.api:
    image: ${DOCKER_REGISTRY-}catalogapi
    build:
      context: .
      dockerfile: Services/Catalog/Catalog.Api/Dockerfile
    ports:
      - "8000:8080"
    depends_on:
      - catalogdb
    environment:
      - DatabaseSettings__ConnectionString=mongodb://catalogdb:27017
      - DatabaseSettings__DatabaseName=CatalogDb
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:8080
    volumes:
      - ./Services/Catalog:/src

  catalogdb:
    image: mongo
    container_name: catalogdb
    ports:
      - "27017:27017"
    volumes:
      - catalogdata:/data/db

  Basketdb:
    image: redis:alpine
    container_name: Basketdb
    restart: always 
    ports:
      - "6379:6379"

  Discountdb:
     image: postgres:alpine
     container_name: Discountdb
     restart: always 
     ports:
       - "5432:5432" 
     environment:
       - POSTGRES_USER=admin
       - POSTGRES_PASSWORD=password@1
       - POSTGRES_DB=DisCountDb
     healthcheck:
         test: ["CMD-SHELL", "pg_isready -U admin -d DisCountDb"] 
         interval: 10s
         timeout: 5s
         retries: 5
     volumes:
      - postgres_data_v18:/var/lib/postgresql 
 

  Orderdb:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: Orderdb
    restart: always 
    environment:
      ACCEPT_EULA: "Y"
      SA_PASSWORD: "password@1"
      MSSQL_PID: "Express"
    ports:
      - "1433:1433" 
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P 'password@1' -Q 'Select 1' -C"] 
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - orderdb_data:/var/opt/mssql
        
  pgadmin:
    image: dpage/pgadmin4
    container_name: pgadmin
    restart: always
    ports:
        - "5050:80"
    environment:
        - PGADMIN_DEFAULT_EMAIL=admin@admin.com
        - PGADMIN_DEFAULT_PASSWORD=admin
    volumes:
        - pgadmin_data:/var/lib/pgadmin

  basket.api:
    image: ${DOCKER_REGISTRY-}basketapi
    build:
      context: .
      dockerfile: Services/Basket/Basket.Api/Dockerfile
    ports:
      - "8001:8080"
    depends_on:
      - Basketdb
    environment:
      - CacheSettings__ConnectionString=Basketdb:6379
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:8080
      - "GrpcSettings__DiscountUrl=http://discount.api:8080"
  portainer:
    image: portainer/portainer-ce
    container_name: portainer
    restart: always
    ports:
     - "9000:9000"      
     - "9443:9443"  
    volumes:
    - portainer_data:/data
    - /var/run/docker.sock:/var/run/docker.sock
     
  

  discount.api:
    image: ${DOCKER_REGISTRY-}discountapi
    build:
      context: .
      dockerfile: Services/DisCount/DisCount.Api/Dockerfile
    container_name: discount.api
    ports:
      - "8002:8080"
    depends_on:
      Discountdb:
        condition: service_healthy  
    environment:
      
      - "ConnectionStrings__DefaultConnection=Host=Discountdb;Port=5432;Database=DisCountDb;Username=admin;Password=password@1"
      - "ASPNETCORE_ENVIRONMENT=Development"
      - "ASPNETCORE_URLS=http://+:8080"
      - "DOTNET_RUNNING_IN_CONTAINER=true"

  ordering.api:
    image: ${DOCKER_REGISTRY-}orderingapi
    build:
      context: .
      dockerfile: Services/Ordering/Ordering.Api/Dockerfile
    ports:
      - "8003:8080"
    depends_on:
      Orderdb:
        condition: service_healthy
    environment:
      - "ConnectionStrings__OrderingConnection=Server=Orderdb;Database=OrderingDb;User Id=sa;Password=password@1;TrustServerCertificate=True"
      - "ASPNETCORE_ENVIRONMENT=Development"
      - "ASPNETCORE_URLS=http://+:8080"
      - "DOTNET_RUNNING_IN_CONTAINER=true"


volumes:
  catalogdata:
  portainer_data:
  postgres_data_v18:
  pgadmin_data:
  orderdb_data:


